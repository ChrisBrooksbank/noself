<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#1a1a2e" />
        <meta name="description" content="Buddhist contemplation PWA" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="apple-touch-icon" href="/icons/icon-192.png" />
        <title>noself</title>
        <link rel="stylesheet" href="/src/styles/main.css" />
    </head>
    <body>
        <div id="app"></div>
        <script>
            (function () {
                var d = document.documentElement;
                var t = localStorage.getItem('noself:theme');
                if (t === 'dark' || t === 'light' || t === 'auto')
                    d.setAttribute('data-theme', t);
                else d.setAttribute('data-theme', 'dark');
                var f = localStorage.getItem('noself:fontSize');
                if (f === 'small' || f === 'medium' || f === 'large' || f === 'xl')
                    d.setAttribute('data-font-size', f);
            })();
        </script>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
