brief: |
    The systematic cultivation and training of the mind. Bhāvanā literally means "development" or "bringing into being" — meditation in Buddhism is not escape from the world but a disciplined practice of seeing it clearly.

essentials: |
    In Buddhism, meditation is not a single technique but a family of practices with different purposes. The two great streams are samatha (calm abiding, concentration) and vipassana (insight). Samatha settles and unifies the mind; vipassana sees into the true nature of experience. Most Buddhist meditation traditions include both.

    The purpose of bhāvanā is transformation. Through repeated practice, we develop qualities that don't come naturally to the untrained mind — sustained attention, emotional balance, clear seeing, and compassion. The Buddha compared the mind to a wild animal that can be tamed, or to gold ore that must be refined.

    You don't need special conditions to meditate. While dedicated sitting practice is the traditional foundation, the Buddha also taught walking meditation, standing meditation, and mindfulness in daily activities. The key is regularity and sincerity rather than dramatic experiences. As many teachers say, the most important meditation session is the next one.

deep: |
    Bhāvanā derives from the root "bhū" (to become, to develop). It literally means "cultivation" or "making become" — a very different connotation from the popular image of meditation as emptying the mind or blissing out. Buddhist meditation is active, intentional mental training.

    The Buddha taught a remarkable variety of meditation practices, traditionally numbered at forty in the Visuddhimagga (Path of Purification) by Buddhaghosa. These include:

    **Concentration practices (samatha):** Ten kasiṇa (visual meditation devices), ten recollections (of the Buddha, Dharma, Sangha, virtue, generosity, devas, death, the body, breathing, and peace), four brahmaviharas (loving-kindness, compassion, sympathetic joy, equanimity), four formless attainments, perception of the repulsiveness of food, and analysis of the four elements.

    **Insight practices (vipassana):** Systematic observation of the three marks of existence — impermanence, suffering, and non-self — in one's direct experience. This includes body scanning, noting practice, and contemplation of the aggregates, sense bases, and dependent origination.

    Different Buddhist traditions emphasize different approaches. Theravada traditions (especially the Burmese lineages of Mahasi Sayadaw and S.N. Goenka, and the Thai Forest tradition of Ajahn Chah) focus on structured vipassana practice, often combined with samatha. Zen emphasizes zazen — sitting meditation that may take the form of breath counting, kōan practice, or shikantaza (choiceless awareness). Tibetan Buddhism includes visualization practices, mantra recitation, and advanced techniques like Dzogchen and Mahāmudrā. Pure Land Buddhism centers on nenbutsu — the recitation of Amitābha Buddha's name.

    The relationship between samatha and vipassana has been much discussed. Some traditions present them as sequential — first develop concentration, then use that concentrated mind for insight. Others, especially in the Thai Forest tradition, see them as working together from the beginning. The Buddha himself appears to have used both: he developed the jhānas (deep concentration states) and then turned that refined awareness toward insight into the nature of reality.

    In terms of practical instruction, the Ānāpānasati Sutta (MN 118) provides one of the most complete meditation guides, outlining sixteen steps of mindfulness of breathing that encompass both samatha and vipassana.

examples:
    - source: 'Dhammapada, verse 372'
      text: |
          "There is no meditation without wisdom, and there is no wisdom without
          meditation. One in whom there is both meditation and wisdom is close
          to Nibbana."
      commentary: |
          This verse captures the essential Buddhist teaching that meditation and
          wisdom are inseparable — concentration without insight is incomplete,
          and insight without the stability of meditation lacks depth.
    - source: 'Ajahn Chah'
      text: |
          "You are your own teacher. Looking for teachers can't solve your own
          doubts. Investigate yourself to find the truth — inside, not outside.
          Knowing yourself is most important."
      commentary: |
          Ajahn Chah reminds us that meditation is ultimately self-investigation.
          Teachers and techniques point the way, but the seeing must be your own.
