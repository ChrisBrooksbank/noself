brief: |
    One who aspires to full awakening not for themselves alone but for the benefit of all beings. The bodhisattva path transforms spirituality from a personal escape into a compassionate engagement with the suffering world.

essentials: |
    In early Buddhism, the ideal practitioner is the arahant — one who has extinguished all defilements and is free from the cycle of rebirth. In Mahayana Buddhism, a different ideal emerged: the bodhisattva — one who delays their own final liberation in order to help all beings awaken.

    The bodhisattva path begins with bodhicitta — the awakening mind — the deep aspiration to attain complete buddhahood for the sake of all sentient beings. This is not a vague wish but a commitment that reshapes one's entire life. The bodhisattva then trains in the six perfections (pāramitā): generosity, ethical conduct, patience, energetic effort, meditative concentration, and wisdom.

    The bodhisattva ideal reflects a profound insight: that liberation and compassion are not in conflict. In fact, the deepest freedom arises precisely through letting go of self-centeredness and turning toward others. As the boundary between self and other dissolves through practice, the question "Should I save myself or save others?" loses its meaning — there is no separation to negotiate.

deep: |
    The bodhisattva concept appears in early Buddhism, where "bodhisatta" refers to Siddhartha Gautama before his awakening and, in the Jātaka tales, to his many previous lives of perfection-building. In Mahayana Buddhism, the concept was democratized — any being can aspire to become a bodhisattva.

    **Bodhicitta — the awakening mind** has two aspects. Relative bodhicitta is the compassionate aspiration to attain buddhahood for the benefit of all beings. Ultimate bodhicitta is the direct insight into emptiness — the recognition that self, other, and the path itself are all empty of inherent existence. These two aspects are inseparable: compassion without wisdom can become sentimental, and wisdom without compassion can become cold.

    **The six pāramitā (perfections):**
    1. Dāna (generosity): giving material goods, Dharma teachings, and fearlessness
    2. Śīla (ethical conduct): non-harming and positive ethical behavior
    3. Kṣānti (patience): forbearance with difficult situations, people, and deep truths
    4. Vīrya (energetic effort): joyful perseverance in practice
    5. Dhyāna (meditation): development of concentration and mental stability
    6. Prajñā (wisdom): direct insight into emptiness and dependent origination

    Some traditions add four more: skillful means, aspiration, power, and knowledge — making ten perfections total.

    **The bodhisattva's stages (bhūmi):** The Daśabhūmika Sūtra describes ten stages of bodhisattva development, from the initial generation of bodhicitta through increasingly profound realizations of emptiness and compassion, culminating in buddhahood.

    **Great bodhisattvas** in the Mahayana tradition include Avalokiteśvara (compassion), Mañjuśrī (wisdom), Kṣitigarbha (vow to liberate beings from hell realms), and Samantabhadra (practice and aspiration). These are not merely mythological figures but embodiments of qualities that practitioners aspire to develop.

    **The bodhisattva vow** is one of the most audacious commitments in any spiritual tradition: "Sentient beings are numberless; I vow to save them. Delusions are inexhaustible; I vow to end them. Dharma gates are boundless; I vow to enter them. The Buddha way is unsurpassable; I vow to become it." The vow is impossible to fulfill literally — and that is precisely the point. It expresses a boundless aspiration that continually calls the practitioner beyond self-interest.

    Śāntideva's Bodhicaryāvatāra (8th century) is the classic text on the bodhisattva path, combining rigorous philosophical argument with soaring devotional poetry. His teaching on the "exchange of self and other" (parātmasamatā and parātmaparivartana) provides both a logical and contemplative basis for bodhisattva compassion.

examples:
    - source: 'Bodhisattva Vow (various traditions)'
      text: |
          "Sentient beings are numberless; I vow to save them. Delusions are
          inexhaustible; I vow to end them. Dharma gates are boundless; I vow
          to enter them. The Buddha way is unsurpassable; I vow to become it."
      commentary: |
          The four great vows — recited daily in Zen temples worldwide — express
          the bodhisattva's impossible, beautiful commitment. The vow is not
          a contract to fulfill but an orientation that transforms everything.
    - source: 'Śāntideva, Bodhicaryāvatāra 3.22'
      text: |
          "For as long as space endures and for as long as living beings remain,
          until then may I too abide to dispel the misery of the world."
      commentary: |
          Śāntideva's dedication of his practice — as long as there is
          suffering, the bodhisattva remains. This is compassion that has no
          expiration date and no exit strategy.
