id: dukkha
title: Suffering / Unsatisfactoriness
pali: Dukkha
sanskrit: Duḥkha
terms:
    pali:
        text: Dukkha
        language: pali
        literal: suffering, unsatisfactoriness
        etymology: 'du (bad, difficult) + kha (axle-hole of a wheel)'
        phonetic: DOOK-kah
    sanskrit:
        text: Duḥkha
        language: sanskrit
        literal: suffering, unsatisfactoriness
        etymology: 'duḥ (bad, difficult) + kha (axle-hole of a wheel)'
        phonetic: DOOK-kah
category: three-marks
related: [three-marks, anicca, anatta, four-noble-truths, three-poisons, samsara, nirvana]

simpleBrief: >
    Life has a built-in itch. Even when things are good, there's a nagging feeling
    that they could be better or won't last. Buddhism starts by being honest about
    that — and then shows you what to do about it.

brief: |
    Often translated as "suffering," dukkha points to something subtler: the inherent unsatisfactoriness of clinging to anything impermanent. It is both the problem the Buddha diagnosed and the starting point of the path to freedom.

essentials: |
    Dukkha is one of the most misunderstood Buddhist terms. When people hear "life is suffering," they imagine Buddhism as grim and world-denying. But dukkha is far more nuanced than the English word "suffering" conveys. It includes obvious pain, yes, but also the subtle dissatisfaction that runs through even pleasant experiences when we try to hold onto them.

    The Buddha described three types of dukkha. The first is ordinary suffering — physical pain, grief, illness, loss. The second is the suffering of change — even happiness is tinged with dukkha because it doesn't last. The third is the deepest: the unsatisfactoriness inherent in conditioned existence itself. As long as we identify with a separate self navigating an impermanent world, there is a background hum of unease.

    But dukkha is not the whole story. The Buddha didn't stop at diagnosis — he offered a complete path to its cessation. Understanding dukkha is not about wallowing in misery. It's about honest acknowledgment, the way a doctor must accurately name an illness before prescribing a cure. And the cure — the Third Noble Truth — is that this suffering can end completely.

deep: |
    The word dukkha has etymological roots worth exploring. The prefix "du" means "bad" or "difficult," and "kha" originally referred to the axle-hole of a wheel. A wheel with a bad axle-hole gives a rough, wobbly ride. This metaphor captures dukkha beautifully: not necessarily agony, but a fundamental "off-centeredness" in how we relate to experience.

    The first systematic exposition of dukkha comes in the Dhammacakkappavattana Sutta (SN 56.11), where it is the content of the First Noble Truth. The Saccavibhanga Sutta (MN 141), delivered by Sariputta, provides a detailed analysis of each type.

    **Dukkha-dukkha** (suffering of suffering): the obvious — physical pain, mental anguish, grief, despair. This is what everyone recognizes as suffering.

    **Viparinama-dukkha** (suffering of change): the unsatisfactoriness inherent in pleasant experiences because they change. The joy of a wonderful meal ends. The excitement of a new relationship fades into familiarity. Even peak experiences cannot be sustained.

    **Sankhara-dukkha** (suffering of conditioned existence): the subtlest form, referring to the unsatisfactoriness inherent in all conditioned phenomena. Because the five aggregates that make up our experience are impermanent and not-self, there is an inherent instability in every moment of unawakened experience.

    In Mahayana Buddhism, dukkha takes on additional dimensions through the bodhisattva ideal. The bodhisattva doesn't seek to escape dukkha for themselves alone but vows to remain engaged with the suffering world until all beings are free. This transforms the relationship with dukkha from aversion to compassion.

    An important nuance: the Buddha did not teach that everything is suffering. He taught that clinging to impermanent, conditioned phenomena leads to dukkha. The distinction matters. A sunset is not inherently suffering — but grasping at it, wishing it would stay, comparing it to past sunsets, photographing it instead of seeing it — this is where dukkha enters.

    The Third Noble Truth — that dukkha can cease — is crucial for understanding the teaching correctly. Buddhism is not pessimism dressed in robes. It is a radical assertion that the deepest form of happiness (nibbāna) is possible, and it comes not from getting what we want but from transforming how we relate to experience.

examples:
    - source: 'Dhammacakkappavattana Sutta (SN 56.11)'
      text: |
          "In brief, the five aggregates subject to clinging are suffering."
      commentary: |
          This concise statement connects dukkha directly to the five aggregates
          and to clinging — it is not existence itself that is suffering, but
          our habitual identification with and grasping at the components of
          experience.
    - source: 'Ajahn Chah'
      text: |
          "If you want to understand suffering, you have to look into the nature
          of happiness. If you want to understand happiness, you have to look
          into the nature of suffering. They are inseparable."
      commentary: |
          Ajahn Chah points to the non-dual nature of dukkha — it is not the
          opposite of happiness but intimately woven with it, and understanding
          one illuminates the other.
