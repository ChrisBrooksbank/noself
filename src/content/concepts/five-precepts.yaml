simpleBrief: >
    Five basic guidelines for living well: don't harm others, don't steal, be
    respectful in relationships, be honest, and stay clear-headed. They're not
    commandments — they're commitments you make to yourself.

brief: |
    Five training rules that form the ethical foundation of Buddhist practice: refraining from harming living beings, taking what is not given, sexual misconduct, false speech, and intoxicants that cloud the mind.

essentials: |
    The Five Precepts are not commandments imposed from above but voluntary training rules that a practitioner undertakes out of compassion — for others and for oneself. They create the conditions in which meditation and wisdom can flourish, because a mind burdened by guilt, deception, or harm cannot settle into clarity.

    The five are: (1) I undertake the training rule to refrain from taking life. (2) I undertake the training rule to refrain from taking what is not given. (3) I undertake the training rule to refrain from sexual misconduct. (4) I undertake the training rule to refrain from false speech. (5) I undertake the training rule to refrain from intoxicants that cause heedlessness.

    Notice the language: "I undertake the training rule." This is not "Thou shalt not" but a personal commitment to practice. When you break a precept, you don't sin — you simply recognize that you strayed from your training and recommit. Thich Nhat Hanh reformulated the precepts in positive terms — as practices of protecting life, practicing generosity, honoring the body, speaking truthfully, and consuming mindfully. This positive framing reveals the precepts not as restrictions but as expressions of love.

deep: |
    The Five Precepts (pañca sīla) are the most basic level of ethical practice in Buddhism, observed by both monastics and laypeople. They form part of the "ethics" (sīla) division of the Noble Eightfold Path, corresponding to Right Speech, Right Action, and Right Livelihood.

    Each precept has multiple dimensions:

    **1. Not killing (pāṇātipātā veramaṇī):** At its most basic, refraining from intentionally killing any sentient being. This extends to a positive cultivation of reverence for life, gentleness, and non-violence (ahiṃsā). It's the foundation of the Buddhist commitment to compassion.

    **2. Not stealing (adinnādānā veramaṇī):** Refraining from taking what is not freely given. More broadly, practicing generosity (dāna) and contentment. This includes not exploiting others economically or taking more than one's fair share of resources.

    **3. Not engaging in sexual misconduct (kāmesumicchācārā veramaṇī):** In the traditional context, refraining from adultery and sexual exploitation. Thich Nhat Hanh expanded this to "not engaging in sexual relations without love and a long-term commitment," and more broadly to protecting oneself and others from sexual harm.

    **4. Not lying (musāvādā veramaṇī):** Refraining from false speech. The expanded form includes not speaking divisively, not speaking harshly, and not engaging in idle chatter (the four aspects of Right Speech). Positively, it means cultivating truthful, harmonious, gentle, and meaningful communication.

    **5. Not taking intoxicants (surāmerayamajjapamādaṭṭhānā veramaṇī):** Refraining from alcohol and drugs that lead to heedlessness (pamāda). This precept is sometimes seen as supporting all the others — intoxicants impair judgment and make it easier to break the other four precepts. TNH expanded this to mindful consumption in general, including media and entertainment that agitate the mind.

    In Theravada countries, the precepts are formally recited in Pali during religious observances. On special occasions (uposatha days), laypeople may undertake eight precepts, adding restraints on eating after noon, entertainment, and sleeping on luxurious beds.

    In Mahayana Buddhism, the bodhisattva precepts expand the ethical framework significantly, adding commitments to benefit all beings and to practice the perfections (pāramitā). The Zen tradition also has its own precept ceremonies (jukai), where receiving the precepts marks a deepening of one's commitment to practice.

examples:
    - source: 'Dhammapada, verse 183'
      text: |
          "To avoid all evil, to cultivate good, and to purify one's mind —
          this is the teaching of all the Buddhas."
      commentary: |
          This verse summarizes the spirit of ethical practice in Buddhism — the
          precepts are not merely prohibitions but part of a larger cultivation
          of goodness and mental clarity.
    - source: 'Thich Nhat Hanh, For a Future to Be Possible'
      text: |
          "The First Precept: Aware of the suffering caused by the destruction
          of life, I am committed to cultivating compassion and learning ways
          to protect the lives of people, animals, plants, and minerals."
      commentary: |
          TNH's reformulation transforms each precept from a negative prohibition
          into a positive commitment — revealing the precepts as practices of
          love rather than restriction.
