brief: |
    Intentional actions of body, speech, and mind create consequences that shape our experience. In Buddhism, karma is not fate or cosmic punishment — it is the natural principle that our choices matter and have real effects.

essentials: |
    The Buddhist understanding of karma differs significantly from the popular notion of cosmic reward and punishment. The Buddha defined karma simply as cetanā — intention. "It is intention that I call karma," he said in the Nibbedhika Sutta (AN 6.63). What matters is not merely what happens outwardly but the quality of mind behind an action.

    Actions rooted in greed, hatred, and delusion tend to produce suffering — for ourselves and others. Actions rooted in generosity, compassion, and wisdom tend to produce well-being. This isn't because a divine judge is keeping score but because wholesome states of mind naturally lead to different outcomes than unwholesome ones. Anger breeds conflict; kindness builds trust. The connection between action and result is as natural as the connection between planting and harvesting.

    Importantly, Buddhist karma is not deterministic. Past actions influence but do not control the present moment. Right now, in this moment, you can choose how to respond to whatever has arisen. This teaching is ultimately empowering — your future is shaped not by fate but by the quality of your present choices and intentions.

deep: |
    The Buddha inherited the concept of karma from Indian religious thought but transformed it in several important ways.

    **Intention as the essence of karma:** Pre-Buddhist Indian thought often defined karma primarily in terms of ritual action — performing the right sacrifices correctly. The Buddha's radical move was to locate karma in mental intention (cetanā). A technically perfect action motivated by ill will still produces unwholesome karma, while a well-intentioned action that goes awry does not carry the same karmic weight.

    **Three types of karma:** Buddhist teaching distinguishes karma of body (kāya-kamma), speech (vacī-kamma), and mind (mano-kamma), with mental karma considered the most potent.

    **The results of karma (vipāka)** are understood to manifest across different timescales — in this life, in the next life, or in some future life. However, the relationship between action and result is not simple or linear. The Buddha compared it to seeds planted in different soils — the same seed (action) can produce different results depending on conditions. This is why the Buddha rejected the deterministic view that "everything one experiences is the result of past karma" (MN 101).

    **Karma and rebirth:** In traditional Buddhist understanding, karma is the force that drives the process of rebirth (saṃsāra). Wholesome karma leads to favorable rebirths; unwholesome karma leads to unfavorable ones. The ultimate goal is not better karma but the cessation of karma altogether — nibbāna, which is "the end of the making of karma."

    **Common misunderstandings:**
    Karma is not fatalism. The Buddha explicitly rejected the Jain teaching that all present experience is determined by past actions. Present experience is shaped by past karma, present karma, and natural processes (such as illness from biological causes).

    Karma is not cosmic justice or punishment. It is a natural process, more like gravity than a courtroom. Saying someone "deserved" their suffering because of karma is a misuse of the teaching and was rejected by the Buddha.

    Karma is not only about dramatic moral choices. Every moment of intention — every small act of patience or irritation, honesty or deception — contributes to the stream of karma. This makes ordinary life the primary field of practice.

    In Mahayana Buddhism, the concept of karma is enriched by the teaching of emptiness. Since all phenomena (including karma) are empty of inherent existence, karma operates within the framework of dependent origination — real and consequential, but not ultimately fixed or solid. This understanding supports the possibility of radical transformation at any moment.

examples:
    - source: 'Nibbedhika Sutta (AN 6.63)'
      text: |
          "It is intention that I call karma. Having intended, one acts through
          body, speech, and mind."
      commentary: |
          The Buddha's redefinition of karma — shifting the emphasis from external
          ritual action to the inner quality of intention. This single statement
          transformed Indian ethical thought.
    - source: 'Dhammapada, verses 1–2'
      text: |
          "Mind is the forerunner of all actions. All deeds are led by mind,
          created by mind. If one speaks or acts with a corrupt mind, suffering
          follows, as the wheel follows the hoof of the ox. If one speaks or
          acts with a serene mind, happiness follows, as a shadow that never
          departs."
      commentary: |
          The opening verses of the Dhammapada establish the centrality of mind
          in shaping experience — the most concise statement of the karma
          principle in all of Buddhist literature.
