id: karuna
title: Compassion
pali: Karuṇā
sanskrit: Karuṇā
category: brahmaviharas
related: [metta, mudita, upekkha, bodhisattva, dukkha, anatta]

brief: |
  The heart that trembles in response to suffering and wishes for its relief. Compassion is metta meeting pain — not turning away from suffering but turning toward it with the wish to help.

essentials: |
  Compassion (karuṇā) is the second brahmavihara, and it arises naturally when loving-kindness encounters suffering. If metta is the wish "May you be happy," karuṇā is the response when someone clearly isn't — "May you be free from this suffering."

  Compassion in the Buddhist sense is not pity, which looks down on the sufferer from a position of comfort. It is the recognition that suffering is a universal experience — "This being suffers, just as I have suffered, just as all beings have suffered." This recognition dissolves the barrier between self and other.

  The Buddha's entire teaching career was an expression of compassion. After his awakening, he could have remained in solitary bliss — tradition says he hesitated, doubting whether the teaching could be understood. But compassion moved him to teach for forty-five years, adapting his message to each person's capacity, never turning anyone away.

  Practicing compassion also means extending it to yourself. Many of us are far harder on ourselves than on others. Self-compassion is not self-indulgence — it is the recognition that you, too, are a being who suffers and who deserves kindness.

deep: |
  In the Theravada tradition, karuṇā is formally practiced as a meditation (karuṇā-bhāvanā), using phrases like "May this being be free from suffering" directed progressively toward different categories of beings, similar to metta practice. The Visuddhimagga describes compassion as the wish for beings to be free from suffering, with its near enemy being grief (sorrow that overwhelms rather than motivates) and its far enemy being cruelty.

  The distinction between compassion and its "near enemy" is important. Compassion fatigue, burnout, and empathic distress arise when we absorb another's suffering rather than meeting it with a stable, caring presence. True compassion is sustained by wisdom and equanimity — it is tender but not fragile.

  In Mahayana Buddhism, karuṇā takes center stage. The bodhisattva's primary motivation is mahākaruṇā — "great compassion" — the aspiration to liberate all sentient beings from suffering. This is not merely an emotion but a fundamental orientation of one's entire life toward the welfare of others.

  Avalokiteśvara (Guanyin in Chinese, Kannon in Japanese, Chenrezig in Tibetan) is the bodhisattva who embodies compassion. The name means "the one who hears the cries of the world." Legend says that when Avalokiteśvara saw the extent of suffering in the world, their head split into eleven pieces from the anguish, and Amitābha Buddha gave them eleven heads to hear more cries and a thousand arms to reach more beings.

  Śāntideva's Bodhicaryāvatāra (Guide to the Bodhisattva's Way of Life, 8th century) contains some of the most powerful philosophical arguments for compassion. His key insight: "All the suffering in the world comes from seeking happiness for oneself. All the happiness in the world comes from seeking happiness for others." He argues that since there is no inherent boundary between self and other (anattā), expanding our circle of concern is both rational and natural.

  In Tibetan Buddhism, tonglen ("sending and taking") is a powerful compassion practice: visualizing taking in the suffering of others with each inbreath and sending them happiness with each outbreath. This practice directly counters the habitual tendency to avoid suffering and hoard happiness.

  Contemporary research in contemplative neuroscience distinguishes between empathic distress (feeling overwhelmed by others' suffering) and compassionate concern (a warm, caring motivation to help). Compassion meditation appears to strengthen the latter while reducing vulnerability to the former — suggesting that compassion, far from being draining, is actually a source of resilience.

examples:
  - source: "Dhammapada, verse 5"
    text: |
      "Hatred is never appeased by hatred in this world. By non-hatred
      alone is hatred appeased. This is an eternal law."
    commentary: |
      While this verse addresses hatred directly, it expresses the
      fundamental logic of compassion — that meeting suffering with more
      suffering only multiplies it, while meeting it with care can transform
      it.
  - source: "Śāntideva, Bodhicaryāvatāra 8.120"
    text: |
      "All the suffering in the world arises from seeking happiness for
      oneself. All the happiness in the world arises from seeking happiness
      for others."
    commentary: |
      Śāntideva's radical equation — a philosophical basis for compassion
      rooted in the insight of non-self. If the boundary between self and
      other is conventional rather than absolute, then universal compassion
      is simply clear seeing.
