id: metta
title: Loving-Kindness
pali: Mettā
sanskrit: Maitrī
category: brahmaviharas
related: [karuna, mudita, upekkha, bhavana, three-poisons, bodhisattva]

brief: |
    The practice of cultivating unconditional goodwill toward all beings — including yourself. Metta is not sentimental love but a steady, boundless wish for happiness that dissolves the barriers between self and other.

essentials: |
    Metta is the first of the four brahmaviharas — the "divine abodes" or "immeasurable qualities" of the heart. It is the simple, radical wish: "May you be happy. May you be safe. May you be healthy. May you live with ease."

    The practice traditionally begins with directing loving-kindness toward yourself — because, as the Buddha observed, searching the whole world you will never find anyone more deserving of your love than yourself. From this foundation, metta gradually extends outward: to a benefactor, a dear friend, a neutral person, a difficult person, and finally to all beings everywhere, without exception.

    Metta is not a feeling you force yourself to have but an intention you plant and water. Some days the phrases feel dry and mechanical — that's fine. The practice works through repetition, like water wearing away stone. Over time, metta softens the habitual patterns of self-criticism, irritability, and judgment, and reveals a natural warmth that was always there beneath the surface.

deep: |
    The Metta Sutta (Snp 1.8, also known as the Karaniya Metta Sutta) is the primary text, likely composed for monks living in forest dwellings who were troubled by fear of wild animals and spirits. The Buddha prescribed metta practice as both a protection and a transformative meditation.

    The sutta describes the quality of metta beautifully: "Just as a mother would protect her only child with her life, even so let one cultivate a boundless love towards all beings. Let one's thoughts of boundless love pervade the whole world — above, below, and across — without any obstruction, without any hatred, without any enmity."

    In the Visuddhimagga, Buddhaghosa outlines the systematic practice in detail. The meditator begins with themselves and progressively extends metta through five categories:
    1. Oneself
    2. A respected, beloved person (easy to feel warmth toward)
    3. A dear friend
    4. A neutral person (someone you neither like nor dislike)
    5. A difficult person (someone you have conflict with)

    The goal is to eventually break down the barriers between these categories until metta flows equally toward all beings. This "breaking of barriers" (sīmā sambheda) is a sign of deepening practice.

    Metta practice can also develop into deep concentration (jhāna). The Visuddhimagga states that metta can lead to the first three jhānas (but not the fourth, which requires equanimity beyond the warmth of metta).

    Neuroscience research on metta meditation has shown measurable effects on brain function, including increased activity in brain regions associated with empathy and emotional regulation, and decreased activity in the amygdala (the brain's threat-detection center).

    In the Mahayana tradition, metta is closely related to bodhicitta — the aspiration to attain awakening for the benefit of all beings. The bodhisattva's boundless compassion is an extension of metta to its ultimate conclusion.

    A common misunderstanding is that metta means being nice or agreeable regardless of circumstances. But genuine metta can be fierce — a mother's love sometimes means setting boundaries. The Buddha himself spoke difficult truths out of metta. True loving-kindness wants genuine happiness for beings, which sometimes requires honesty rather than pleasantness.

examples:
    - source: 'Karaniya Metta Sutta (Snp 1.8)'
      text: |
          "Just as a mother would protect her only child with her life, even
          so let one cultivate a boundless love towards all beings. Let one's
          thoughts of boundless love pervade the whole world — above, below,
          and across — without any obstruction, without any hatred, without
          any enmity."
      commentary: |
          The definitive metta image — a mother's instinctive, boundless love
          extended to all beings in all directions. The aspiration is vast
          because anything less leaves someone out.
    - source: 'Ajahn Chah'
      text: |
          "If you haven't cried deeply a number of times, your meditation
          hasn't really begun."
      commentary: |
          While not specifically about metta, Ajahn Chah's teaching points to
          the tender openness that genuine practice cultivates — the softening
          of the heart that metta practice naturally brings.
