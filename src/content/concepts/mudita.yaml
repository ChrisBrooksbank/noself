id: mudita
title: Sympathetic Joy
pali: Muditā
sanskrit: Muditā
category: brahmaviharas
related: [metta, karuna, upekkha, three-poisons, anatta]

brief: |
  The ability to feel genuine delight in others' happiness and success. Mudita is the antidote to envy and the natural expression of a heart that has softened its boundaries between self and other.

essentials: |
  Of the four brahmaviharas, muditā is often called the most challenging to practice — and perhaps the most revealing. It's easy enough to wish someone well in the abstract, but to feel genuine, uncomplicated joy when someone else succeeds, especially when we feel we haven't? That requires a profound letting go of comparison and self-concern.

  Muditā is the opposite of envy, jealousy, and schadenfreude. Where those responses arise from a sense of scarcity — "their gain is my loss" — muditā arises from abundance. There is no limited supply of happiness. When your friend gets a promotion, when a colleague's project succeeds, when a stranger's child takes their first steps — muditā allows you to receive their joy as your own.

  This is deeply connected to the teaching of non-self. When the boundaries of "self" and "other" soften, other people's happiness naturally becomes a source of your own happiness. Muditā is what non-self feels like in the heart — the natural joy that flows when we stop keeping score.

deep: |
  Muditā is the third brahmavihara, positioned between compassion (response to suffering) and equanimity (balanced awareness). Where mettā wishes for happiness and karuṇā responds to suffering, muditā celebrates happiness that has already arrived.

  In formal practice, muditā meditation follows a similar structure to mettā. The practitioner begins with someone who is currently happy or successful and genuinely rejoices in their good fortune, using phrases like "May your happiness and good fortune continue" or simply "I rejoice in your happiness." The practice extends through the same categories: a beloved person, a friend, a neutral person, a difficult person, and all beings.

  The Visuddhimagga identifies muditā's "near enemy" as exhilaration or giddiness (a selfish, manic excitement) and its "far enemy" as envy (resentment at others' success). The distinction between muditā and its near enemy is important: muditā is warm but grounded, joyful but not unhinged. It is not about getting high on someone else's happiness but about genuinely wishing it to continue.

  Why is muditā so difficult? Because it directly confronts some of our deepest conditioning. Western psychology has documented "social comparison theory" — the habitual tendency to evaluate ourselves relative to others. When someone similar to us succeeds, it can trigger painful feelings of inadequacy. Muditā practice gently but persistently undermines this comparison habit.

  The Buddhist analysis is characteristically precise: envy arises from the delusion that happiness is a zero-sum game. But happiness is not like a pie where each person's slice diminishes what's left. It is more like a candle flame that can light other candles without being diminished. Muditā is the recognition that there is unlimited happiness available.

  In the Mahayana tradition, muditā is closely connected with the practice of "rejoicing in merit" (puṇyānumodanā) — taking joy in the wholesome actions of all beings. This is considered one of the most powerful practices for accumulating merit, because it can be done anywhere, at any time, costs nothing, and has no limit.

  In daily life, muditā practice can be as simple as noticing moments of happiness around you — a child laughing, a couple holding hands, a stranger singing to themselves — and allowing yourself to be nourished by that happiness rather than passing it by or feeling excluded from it.

examples:
  - source: "Visuddhimagga IX"
    text: |
      "As a mother, who on seeing the success of her dear child is glad,
      so one should be glad at the success of all beings."
    commentary: |
      Buddhaghosa uses the natural joy a parent feels at their child's
      happiness as the model for muditā — suggesting that this capacity
      exists naturally in us and simply needs to be extended.
  - source: "Thich Nhat Hanh, Teachings on Love"
    text: |
      "If love does not include muditā, it is not true love. If you are
      not able to feel joy when the other person is happy, that is not
      true love."
    commentary: |
      TNH places muditā at the heart of genuine love — the ability to
      rejoice in another's happiness is not optional but essential to any
      real intimacy or connection.
