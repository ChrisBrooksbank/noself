simpleBrief: >
    Eight ways to live wisely — including being honest, paying attention, and making
    good choices. They all work together like ingredients in a recipe for a happier,
    more peaceful life.

brief: |
    The Fourth Noble Truth made practical: eight interconnected dimensions of wise living — right view, intention, speech, action, livelihood, effort, mindfulness, and concentration. Not sequential steps but a holistic way of being.

essentials: |
    The Noble Eightfold Path is the Buddha's answer to the question "How do we end suffering?" It is traditionally grouped into three trainings: wisdom (paññā), ethical conduct (sīla), and mental cultivation (samādhi). These aren't stages you complete one at a time — they support and deepen each other like the strands of a rope.

    The wisdom group includes Right View (seeing things as they are, especially the Four Noble Truths) and Right Intention (cultivating renunciation, goodwill, and harmlessness). The ethics group — Right Speech, Right Action, and Right Livelihood — provides the foundation of a life that doesn't create unnecessary suffering. The meditation group — Right Effort, Right Mindfulness, and Right Concentration — trains the mind to see clearly and rest in awareness.

    The word "right" (sammā in Pali) doesn't mean morally correct in an authoritarian sense. It's closer to "complete," "balanced," or "in harmony with reality." It's the rightness of a wheel that turns smoothly — everything aligned and working together.

deep: |
    The Eightfold Path is the Fourth Noble Truth — the way leading to the cessation of suffering. It is sometimes called the "Middle Way" because it avoids the extremes of sensual indulgence and harsh asceticism, a lesson the Buddha learned from his own experience of both.

    The eight factors in detail:

    **Wisdom (Paññā):**
    Right View (sammā diṭṭhi) begins with understanding the Four Noble Truths and karma. At deeper levels, it means seeing the three marks of existence — impermanence, unsatisfactoriness, and non-self — directly in one's experience. Right Intention (sammā saṅkappa) means aligning one's motivation with renunciation, loving-kindness, and compassion rather than craving, ill will, and cruelty.

    **Ethics (Sīla):**
    Right Speech (sammā vācā) means abstaining from lying, divisive speech, harsh speech, and idle chatter — and cultivating truthful, harmonious, gentle, and meaningful communication. Right Action (sammā kammanta) means abstaining from killing, stealing, and sexual misconduct. Right Livelihood (sammā ājīva) means earning a living in ways that don't cause harm to others.

    **Mental Cultivation (Samādhi):**
    Right Effort (sammā vāyāma) involves four aspects: preventing unwholesome states from arising, abandoning those already arisen, cultivating wholesome states, and maintaining those already present. Right Mindfulness (sammā sati) is the clear, non-judgmental awareness of body, feelings, mind states, and mental phenomena. Right Concentration (sammā samādhi) is the deepening of meditative absorption.

    In Theravada tradition, the path is often understood as a gradual training. In Mahayana, it is enriched by the bodhisattva ideal and the perfections (pāramitā). In Zen, the emphasis falls on the immediacy of right view — direct seeing into one's nature.

    Importantly, the path is depicted as an eight-spoked wheel, not a ladder. All eight factors are cultivated together. Ethical conduct supports concentration, concentration supports wisdom, and wisdom naturally gives rise to more ethical and mindful living. This mutual reinforcement is what makes the path a living practice rather than a checklist.

examples:
    - source: 'Dhammacakkappavattana Sutta (SN 56.11)'
      text: |
          "And what is the middle way realized by the Tathagata? It is the Noble
          Eightfold Path: right view, right resolve, right speech, right action,
          right livelihood, right effort, right mindfulness, right concentration."
      commentary: |
          The first teaching of the path, presented as the Middle Way between
          self-indulgence and self-mortification.
    - source: "Thich Nhat Hanh, The Heart of the Buddha's Teaching"
      text: |
          "The practice of Right Mindfulness is the practice of all eight
          elements of the path. When Right Mindfulness is present, all the other
          elements of the path are also present."
      commentary: |
          TNH emphasizes the interconnected nature of the path — each factor
          contains and supports all the others.
