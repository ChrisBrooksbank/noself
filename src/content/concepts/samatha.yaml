id: samatha
title: Calm Abiding
pali: Samatha
sanskrit: Śamatha
category: mind-and-practice
related: [bhavana, vipassana, sati, noble-eightfold-path, upekkha]

brief: |
  The practice of settling the mind into deep concentration and tranquility. Samatha calms the waves of mental agitation, creating a clear, stable awareness that can then be turned toward insight.

essentials: |
  If the mind is like a jar of muddy water, samatha is the practice of letting it settle. You don't try to remove the mud — you simply stop stirring. With patience and a gentle focus (usually on the breath), the turbulence gradually calms and the water becomes clear.

  In samatha practice, you choose a single object of attention and return to it again and again. The breath is the most common object, but traditional texts describe many others — a visual device, a quality like loving-kindness, or even a color. As concentration deepens, the mind becomes progressively more unified, still, and luminous. These deepening stages are called jhānas — states of meditative absorption characterized by joy, happiness, and profound equanimity.

  Samatha is not the whole path — the Buddha taught that concentration alone, however blissful, doesn't liberate. But it provides the mental stability and clarity needed for vipassana (insight) to do its work. A mind scattered by agitation can't see clearly; a mind settled through samatha can.

deep: |
  Samatha meditation was not unique to the Buddha — it was already practiced by contemplatives in ancient India. The Buddha himself studied under two teachers, Āḷāra Kālāma and Uddaka Rāmaputta, who taught him to attain the highest formless jhānas. His innovation was recognizing that concentration alone was not sufficient for liberation — it needed to be paired with insight (vipassana).

  The jhāna system describes progressive states of meditative absorption:

  **The Four Form Jhānas (rūpa jhāna):**
  First jhāna: applied and sustained attention, with joy (pīti) and happiness (sukha) born of seclusion from sensual desires.
  Second jhāna: internal confidence and unification of mind, with joy and happiness born of concentration. Applied and sustained thought subside.
  Third jhāna: equanimity, mindfulness, and clear comprehension. Joy fades, replaced by a more refined happiness.
  Fourth jhāna: purified equanimity and mindfulness, beyond both pleasure and pain. The mind is exceptionally clear and stable.

  **The Four Formless Attainments (arūpa):**
  Beyond the form jhānas, the meditator can enter the base of infinite space, infinite consciousness, nothingness, and neither-perception-nor-non-perception.

  The relationship between jhāna and liberation is debated across traditions. Some Theravada scholars argue that jhāna is necessary for awakening, pointing to the Buddha's own use of the fourth jhāna as the platform for his final insight. Others, particularly in the dry-insight (sukkha-vipassanā) tradition, maintain that a degree of concentration short of full jhāna (called "access concentration" or upacāra-samādhi) is sufficient for insight.

  In the Tibetan tradition, śamatha is paired with vipaśyanā in a systematic way, often using the "nine stages of resting the mind" framework from Kamalaśīla's Bhāvanākrama. In Zen, the practice of counting breaths (sūsokukan) serves a similar concentrative function, though Zen generally resists separating samatha from vipassana.

  The five hindrances (nīvaraṇa) — sensual desire, ill will, sloth and torpor, restlessness and remorse, and doubt — are the primary obstacles to samatha. The texts describe them as like trying to see your reflection in water that is colored by dye, boiling, covered with weeds, ruffled by wind, or muddy. Samatha practice is, in part, the patient work of settling these disturbances.

examples:
  - source: "Visuddhimagga (Path of Purification)"
    text: |
      "Concentration is the state of mind that is steady, undisturbed, not
      vacillating, fixed on its object like a lamp in a windless place."
    commentary: |
      Buddhaghosa's classic image captures the quality of samatha — not
      rigidity but steady luminosity, like a flame that burns without
      flickering.
  - source: "Ajahn Chah, A Still Forest Pool"
    text: |
      "Try to be mindful and let things take their natural course. Then
      your mind will become still in any surroundings, like a clear forest
      pool. All kinds of wonderful, rare animals will come to drink at the
      pool, and you will clearly see the nature of all things."
    commentary: |
      Ajahn Chah's signature metaphor for samatha — not forcing the mind
      but creating conditions for natural stillness, which then reveals
      what was always there.
