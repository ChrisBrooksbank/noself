id: sati
title: Mindfulness
pali: Sati
sanskrit: Smṛti
category: mind-and-practice
related: [noble-eightfold-path, bhavana, vipassana, samatha, four-noble-truths]

brief: |
    The quality of clear, present-moment awareness — knowing what is happening as it is happening. Mindfulness is both a foundational meditation practice and a way of being fully alive in each moment.

essentials: |
    Mindfulness (sati) is the seventh factor of the Noble Eightfold Path, but it permeates all the others. At its simplest, mindfulness means paying attention — to your breath, your body, your feelings, your thoughts, and the world around you — without being carried away by judgment or reactivity.

    The Buddha gave detailed instructions for mindfulness practice in the Satipaṭṭhāna Sutta (MN 10), where he described four foundations of mindfulness: awareness of the body (kāya), feelings or feeling-tones (vedanā), mind states (citta), and mental phenomena or dharmas (dhammā). These four domains cover the entirety of human experience.

    Mindfulness is not about achieving a blank mind or suppressing thoughts. It is about seeing clearly. When you are mindful of anger, you know anger is present without being consumed by it. When you are mindful of joy, you can receive it fully without grasping. Thich Nhat Hanh described mindfulness as "keeping one's consciousness alive to the present reality" — a kind of gentle, steady companionship with your own experience.

deep: |
    The Pali word sati comes from a root meaning "to remember" — not in the sense of recalling the past, but in the sense of not forgetting to be aware. It is the opposite of the habitual autopilot mode in which we spend much of our lives.

    The Satipaṭṭhāna Sutta (MN 10) and its longer version, the Mahāsatipaṭṭhāna Sutta (DN 22), are the primary texts. The Buddha opens with a remarkable claim: "This is the direct path for the purification of beings, for the overcoming of sorrow and lamentation, for the disappearance of pain and grief, for the attainment of the true way, for the realization of Nibbāna — namely, the four foundations of mindfulness."

    **The Four Foundations in detail:**

    Mindfulness of body (kāyānupassanā) includes awareness of breathing, bodily postures, physical activities, the anatomical parts of the body, the elements, and even contemplation of a decaying corpse — a practice designed to counter attachment to physical beauty and to cultivate acceptance of mortality.

    Mindfulness of feeling-tone (vedanānupassanā) refers to the quality of pleasant, unpleasant, or neutral that accompanies every moment of experience. This is a critical observation point because vedanā is where craving gets triggered — we automatically grasp at pleasant and push away unpleasant.

    Mindfulness of mind (cittānupassanā) means knowing the overall quality of the mind — whether it is contracted or expanded, distracted or focused, with or without attachment, hatred, or delusion.

    Mindfulness of mental phenomena (dhammānupassanā) includes awareness of the five hindrances, the five aggregates, the six sense bases, the seven factors of enlightenment, and the Four Noble Truths.

    In the modern world, mindfulness has been widely adapted through programs like MBSR (Mindfulness-Based Stress Reduction), developed by Jon Kabat-Zinn. While these secular applications have helped millions, traditional Buddhist mindfulness has a broader scope — it is not merely stress reduction but a path toward deep insight and liberation.

    In the Theravada tradition, sati is closely connected with sampajañña (clear comprehension) — mindfulness with understanding. It's not enough to simply be aware; one must also comprehend the purpose, suitability, and non-delusion in what one is doing.

    In Zen, mindfulness manifests as shikantaza ("just sitting") or as complete presence in any activity — chopping wood, carrying water. In Tibetan Buddhism, it appears in practices like śamatha-vipaśyanā and in the Mahāmudrā tradition of resting in the natural state of mind.

examples:
    - source: 'Satipaṭṭhāna Sutta (MN 10)'
      text: |
          "When breathing in long, one knows 'I breathe in long.' When breathing
          out long, one knows 'I breathe out long.' When breathing in short, one
          knows 'I breathe in short.' When breathing out short, one knows 'I
          breathe out short.'"
      commentary: |
          The most basic mindfulness instruction — beautifully simple and
          endlessly deep. Just know what is happening as it happens.
    - source: 'Thich Nhat Hanh, The Miracle of Mindfulness'
      text: |
          "When washing the dishes, wash the dishes. Every moment is a moment
          to be alive, to be present. If we can't wash the dishes, we can't
          do anything."
      commentary: |
          TNH's most famous teaching on mindfulness — that any moment of genuine
          presence is a moment of practice, whether on a meditation cushion or
          at the kitchen sink.
