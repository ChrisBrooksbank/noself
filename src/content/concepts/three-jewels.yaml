id: three-jewels
title: The Three Jewels
pali: Tiratana
sanskrit: Triratna
category: foundational
related: [four-noble-truths, noble-eightfold-path, awakening, middle-way]

simpleBrief: >
    The three things Buddhists rely on: the Buddha (the teacher who woke up), the
    Dharma (his teachings about life), and the Sangha (the community of people
    practicing together).

brief: |
    Buddha, Dharma, Sangha — the three treasures in which Buddhists take refuge. The awakened teacher, the truth he realized, and the community of practitioners who walk the path together.

essentials: |
    Taking refuge in the Three Jewels is the act that formally marks someone as a Buddhist, but its meaning runs deeper than membership. It is a turning — away from looking for lasting happiness in things that change, and toward the possibility of genuine freedom.

    The Buddha is the first jewel: not a god to worship, but a human being who woke up and showed that awakening is possible for all of us. The Dharma is the second jewel: the truth of how things are, and the teachings that point toward that truth. The Sangha is the third jewel: the community of practitioners who support each other on the path. We cannot walk this path entirely alone.

    Thich Nhat Hanh liked to say that the Three Jewels are not something outside of us. The seed of awakening (Buddha) is in us, the truth (Dharma) is in us, and the capacity for harmony and community (Sangha) is in us. Taking refuge is a practice of touching these qualities within ourselves and around us, moment by moment.

deep: |
    The formula of taking refuge — "Buddhaṃ saraṇaṃ gacchāmi, Dhammaṃ saraṇaṃ gacchāmi, Saṅghaṃ saraṇaṃ gacchāmi" (I go to the Buddha for refuge, I go to the Dharma for refuge, I go to the Sangha for refuge) — is among the oldest recorded Buddhist liturgy, dating to the earliest layers of the Pali Canon.

    **The Buddha** as refuge has different dimensions across traditions. In Theravada, the Buddha is primarily the historical Shakyamuni — a fully enlightened being who is no longer subject to rebirth. Taking refuge means trusting his example and his teaching. In Mahayana, the concept of Buddha expands to include innumerable Buddhas across space and time, and the Buddha-nature (tathāgatagarbha) inherent in all beings. In Zen, the emphasis is on one's own true nature: "If you meet the Buddha on the road, kill him" — meaning don't cling to external images of awakening.

    **The Dharma** has two aspects: the Dharma of scripture (pariyatti) — the teachings preserved in texts and oral tradition — and the Dharma of realization (paṭipatti and paṭivedha) — the actual practice and direct insight into truth. The Dharma is often described with the metaphor of a raft: essential for crossing the river of suffering, but not something to carry on your back once you've reached the other shore.

    **The Sangha** also has different scopes. In the strictest sense, the "Noble Sangha" (ariya saṅgha) refers to those who have attained at least the first stage of awakening (stream-entry). More broadly, it refers to the community of ordained monastics, and more broadly still, to all practitioners — the fourfold sangha of monks, nuns, laymen, and laywomen.

    In modern Buddhist practice, especially in the West, the Sangha has taken on renewed importance. Many teachers emphasize that spiritual practice without community is incomplete. The Sangha provides accountability, encouragement, and the opportunity to practice with others — which itself is a profound practice of non-self.

examples:
    - source: 'Khuddakapatha 1'
      text: |
          "Buddhaṃ saraṇaṃ gacchāmi. Dhammaṃ saraṇaṃ gacchāmi. Saṅghaṃ
          saraṇaṃ gacchāmi."
      commentary: |
          The ancient refuge formula, recited by Buddhists across all traditions
          for over two millennia. It is both the simplest and most foundational
          Buddhist practice.
    - source: 'Thich Nhat Hanh, Being Peace'
      text: |
          "The next Buddha may take the form of a community — a community
          practicing understanding and loving kindness, a community practicing
          mindful living."
      commentary: |
          TNH's vision of Sangha as the continuation of awakening in our time —
          not waiting for a future savior, but embodying the teaching together.
