id: three-marks
title: The Three Marks of Existence
pali: Tilakkhaṇa
sanskrit: Trilakṣaṇa
category: foundational
related: [anicca, dukkha, anatta, four-noble-truths, dependent-origination, vipassana]

brief: |
    The three characteristics shared by all conditioned phenomena: impermanence (anicca), unsatisfactoriness (dukkha), and non-self (anatta). Understanding these marks directly — not just intellectually — is the heart of insight practice.

essentials: |
    The Three Marks are not beliefs to adopt but observations to verify in your own experience. Look at any phenomenon — a thought, a sensation, a relationship, a season — and you will find these three characteristics present.

    Impermanence (anicca) means that everything arises, changes, and passes away. Nothing in our experience remains static, even for a moment. Unsatisfactoriness (dukkha) follows naturally: because everything changes, nothing we cling to can provide lasting fulfillment. Non-self (anatta) goes deepest: there is no unchanging, independent "self" to be found anywhere in our experience. What we call "I" is a flowing process, not a fixed entity.

    These three are deeply interconnected. Because things are impermanent, they are unsatisfactory as objects of clinging. Because they are impermanent and unsatisfactory, they cannot be a true self. Seeing this clearly is not depressing — it is liberating. When we stop demanding permanence from an impermanent world, we can actually appreciate each moment as it is.

deep: |
    The Three Marks of Existence (tilakkhaṇa) represent the Buddhist understanding of the fundamental nature of conditioned reality. They are not prescriptive — the Buddha is not saying the world should be this way — but descriptive: this is what careful observation reveals.

    The teaching appears throughout the Pali Canon. A key formulation is found in the Dhammapada (verses 277–279): "All conditioned things are impermanent (sabbe saṅkhārā aniccā). All conditioned things are unsatisfactory (sabbe saṅkhārā dukkhā). All phenomena are non-self (sabbe dhammā anattā)." The subtle shift in the third mark is significant: while impermanence and dukkha apply to "conditioned things" (saṅkhārā), non-self applies to "all phenomena" (dhammā) — including the unconditioned (nibbāna). Even liberation is not a "self."

    In Theravada vipassana practice, the three marks are the direct objects of insight meditation. The meditator observes the arising and passing of phenomena (anicca), notices the stress of clinging (dukkha), and sees that no experience belongs to or constitutes a self (anatta). The progression of insight knowledges (ñāṇa) in the Visuddhimagga maps out how this understanding deepens through systematic practice.

    In Mahayana Buddhism, the three marks are reframed but not rejected. The teaching of emptiness (śūnyatā) extends the mark of anattā beyond persons to all phenomena — not just "I have no self" but "no phenomenon has independent, inherent existence." The Heart Sutra's famous declaration that "form is emptiness, emptiness is form" can be understood as the Mahayana flowering of the three marks.

    A common misunderstanding is that the three marks make Buddhism nihilistic or pessimistic. But understanding impermanence can deepen gratitude and presence. Understanding dukkha motivates compassion and the search for genuine happiness. Understanding non-self frees us from the prison of self-centeredness and opens us to the interconnected nature of reality.

    The relationship between the three marks has been described as a logical chain: what is impermanent is inherently unreliable (dukkha) as a source of permanent satisfaction; what is impermanent and unreliable cannot be a self, since we intuitively expect a "self" to be stable and under our control. This chain is explicitly stated in the Anattalakkhana Sutta (SN 22.59).

examples:
    - source: 'Dhammapada, verses 277–279'
      text: |
          "All conditioned things are impermanent — when one sees this with
          wisdom, one turns away from suffering. All conditioned things are
          unsatisfactory — when one sees this with wisdom, one turns away from
          suffering. All phenomena are non-self — when one sees this with wisdom,
          one turns away from suffering."
      commentary: |
          These three verses are among the most quoted in all of Buddhism. Note
          how each mark, when truly seen, leads to the same result — turning
          toward freedom.
    - source: 'Ajahn Chah, A Still Forest Pool'
      text: |
          "If you let go a little, you will have a little peace. If you let go
          a lot, you will have a lot of peace. If you let go completely, you
          will have complete peace."
      commentary: |
          Ajahn Chah's direct teaching on the practical result of understanding
          the three marks — the more deeply we see, the more naturally we release
          our grip.
