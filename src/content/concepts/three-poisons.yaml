id: three-poisons
title: The Three Poisons
pali: Akusala-mūla
sanskrit: Triviṣa
category: buddhist-psychology
related: [four-noble-truths, dukkha, karma, five-precepts, samsara, noble-eightfold-path]

brief: |
    Greed (lobha), hatred (dosa), and delusion (moha) — the three root causes of all suffering. These are not moral judgments but descriptions of the habitual mental patterns that keep us trapped in cycles of dissatisfaction.

essentials: |
    At the center of the Buddhist Wheel of Life, you'll find three animals chasing each other in a circle: a rooster (greed), a snake (hatred), and a pig (delusion). They represent the three unwholesome roots — the deep drivers of suffering that operate in every unawakened mind.

    Greed (lobha) is the mind that grasps, clings, and can't get enough. It's not only about material possessions — it includes clinging to experiences, identities, ideas, and even spiritual attainments. Hatred (dosa) is the mind that pushes away, resists, and rejects. It ranges from mild irritation to burning rage and includes resentment, contempt, and cruelty. Delusion (moha) is the most fundamental — the basic ignorance that doesn't see things as they are. It is the fog that makes greed and hatred possible.

    The three poisons have three corresponding antidotes: generosity and contentment (for greed), loving-kindness and compassion (for hatred), and wisdom and clear seeing (for delusion). Buddhist practice doesn't try to suppress the poisons by force but gradually replaces them with these wholesome qualities through mindfulness, meditation, and ethical living.

deep: |
    The three poisons (also called the three unwholesome roots, akusala-mūla) are foundational to Buddhist psychology. They appear in the Mūlapariyāya Sutta (MN 1) and throughout the Abhidhamma's classification of mental states.

    **Lobha (Greed/Desire/Attachment):**
    Lobha ranges from subtle attraction to overwhelming obsession. The Abhidhamma identifies it as a mental factor (cetasika) that accompanies eight types of unwholesome consciousness. It includes taṇhā (craving) — the cause of suffering identified in the Second Noble Truth — as well as upādāna (clinging), which sustains the cycle of becoming. Importantly, lobha is not just wanting material things; it includes clinging to views, to spiritual experiences, and even to the self-concept.

    **Dosa (Hatred/Aversion/Ill Will):**
    Dosa is the mind's rejection response. The Abhidhamma identifies it as accompanying two types of unwholesome consciousness. It ranges from subtle resistance (not wanting things to be as they are) to active hostility. Anger, resentment, fear, contempt, and cruelty are all expressions of dosa. The Buddha taught that hatred is like holding a burning coal — you are the one getting burned (a teaching attributed in the Visuddhimagga).

    **Moha (Delusion/Ignorance):**
    Moha is the most fundamental poison because it enables the other two. Without delusion, greed and hatred cannot operate. Moha is essentially avijjā (ignorance) — the failure to see the three marks of existence (impermanence, unsatisfactoriness, non-self) and the Four Noble Truths. It is the root cause of samsara and the first link in the twelve-fold chain of dependent origination.

    The three poisons and their antidotes form a complete framework for understanding mental health in Buddhist terms. Every unwholesome mental state can be traced back to one or more of these roots. Every wholesome mental state involves the absence of these roots and the presence of their opposites: non-greed (alobha), non-hatred (adosa), and non-delusion (amoha).

    In Mahayana Buddhism, the transformation of the three poisons is understood differently. Rather than simply eliminating them, the tantric and Zen traditions sometimes speak of transmuting the energy of the poisons. In the Vajrayana, greed is transmuted into discriminating wisdom, hatred into mirror-like wisdom, and delusion into the wisdom of the dharmadhātu (the nature of reality). The poisons contain within them the seeds of their own liberation.

    In practical terms, mindfulness of the three poisons is one of the most useful applications of Buddhist psychology in daily life. Simply recognizing "greed is present" or "aversion is present" already begins to loosen their grip, because awareness creates a space between the impulse and the action.

examples:
    - source: 'Dhammapada, verse 251'
      text: |
          "There is no fire like lust, no grip like hatred, no net like
          delusion, no river like craving."
      commentary: |
          The Dhammapada's vivid metaphors capture the distinct quality of each
          poison — lust burns, hatred grips, delusion ensnares, and craving
          sweeps us along.
    - source: 'Thich Nhat Hanh, Anger'
      text: |
          "When we are angry, we ourselves are anger. When anger is born in us,
          we can be aware that anger is an energy in us, and we can accept that
          energy in order to transform it into something more constructive."
      commentary: |
          TNH's approach to the poisons is characteristically gentle — not
          fighting anger but embracing it with mindfulness, the way a mother
          holds a crying child.
