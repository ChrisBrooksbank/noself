id: vipassana
title: Insight Meditation
pali: Vipassanā
sanskrit: Vipaśyanā
terms:
    pali:
        text: Vipassanā
        language: pali
        literal: clear seeing, insight, special seeing
        etymology: 'vi (clear, special, through) + passanā (seeing, from passati: to see)'
        phonetic: vih-PAHS-sah-nah
    sanskrit:
        text: Vipaśyanā
        language: sanskrit
        literal: clear seeing, insight
        etymology: 'vi (clear, special) + paśyanā (seeing, from paśyati: to see)'
        phonetic: vih-PAHSH-yah-nah
category: mind-and-practice
related: [bhavana, samatha, sati, three-marks, anicca, dukkha, anatta, prajna]

brief: |
    The practice of seeing clearly into the nature of experience — directly observing impermanence, unsatisfactoriness, and non-self as they manifest moment by moment. Vipassana is the meditation most directly connected to liberating insight.

essentials: |
    If samatha calms the mind like settling muddy water, vipassana is looking through that clear water to see what's at the bottom. It is the practice of penetrating insight — seeing the three characteristics (impermanence, unsatisfactoriness, non-self) not as ideas but as living realities in your own moment-to-moment experience.

    In vipassana practice, instead of focusing on a single object, you open your attention to whatever arises — a sensation, a sound, an emotion, a thought — and observe it with careful, non-reactive attention. You notice how it arises, how it changes, and how it passes away. Over time, this reveals the impermanent, conditioned, and selfless nature of all experience.

    The goal of vipassana is not a special state but a shift in understanding. Through sustained observation, the meditator begins to see that what seemed solid and personal is actually a flow of impersonal processes. This insight — direct and experiential, not merely intellectual — is what loosens the grip of craving and identification and leads toward liberation.

deep: |
    Vipassanā literally means "clear seeing" or "seeing in a special way" (vi = special/clear; passanā = seeing). It is the specifically Buddhist contribution to meditation — while concentration practices existed in India before the Buddha, the systematic use of focused awareness to investigate the nature of experience was the Buddha's distinctive innovation.

    The primary textual basis is the Satipaṭṭhāna Sutta (MN 10), which outlines the four foundations of mindfulness as the framework for insight practice. The Visuddhimagga (Path of Purification) later systematized the stages of insight into a detailed map of sixteen insight knowledges (ñāṇa), beginning with the knowledge of distinguishing mind and matter and culminating in the knowledge of the path and fruition — the moment of awakening itself.

    **Key insight knowledges include:**
    - Knowledge of arising and passing away (udayabbaya-ñāṇa): seeing the rapid arising and disappearing of phenomena
    - Knowledge of dissolution (bhaṅga-ñāṇa): seeing predominantly the passing away of phenomena
    - Knowledge of equanimity toward formations (saṅkhārupekkhā-ñāṇa): the mind rests in balanced awareness of all formations without clinging or aversion

    In the modern era, several Burmese teachers brought vipassana to a wide audience. Mahasi Sayadaw developed the "noting" technique — labeling each moment of experience ("rising, falling, sitting, touching") to sharpen present-moment awareness. S.N. Goenka taught body scanning as the primary vipassana technique, emphasizing the observation of bodily sensations. U Ba Khin, Goenka's teacher, emphasized the direct experience of anicca (impermanence) through sensation.

    The Thai Forest tradition, associated with Ajahn Mun and Ajahn Chah, takes a somewhat different approach, integrating samatha and vipassana more seamlessly and emphasizing the development of the whole path — ethics, concentration, and wisdom — rather than intensive technique.

    In Tibetan Buddhism, vipaśyanā (the Sanskrit equivalent) is typically practiced after establishing a foundation of śamatha. The Mahāmudrā and Dzogchen traditions represent advanced forms of insight practice that point directly to the nature of mind itself.

    An important distinction: vipassana is not about having special experiences but about understanding ordinary experience deeply. The insight that liberates is not exotic — it is seeing, with complete clarity, what was always true: that everything changes, that clinging causes suffering, and that there is no fixed self at the center of it all.

examples:
    - source: 'Satipaṭṭhāna Sutta (MN 10)'
      text: |
          "One abides contemplating the nature of arising in the body... the
          nature of passing away in the body... the nature of both arising and
          passing away in the body. Mindfulness that 'there is a body' is
          established in one to the extent necessary for bare knowledge and
          continuous mindfulness."
      commentary: |
          The core vipassana instruction — observing the arising and passing of
          phenomena in direct experience, maintaining "bare knowledge" free of
          identification and elaboration.
    - source: 'S.N. Goenka'
      text: |
          "Observe the sensations throughout the body. You are just observing,
          nothing more. Not reacting. Just observing. The entire technique is
          contained in this: observe without reacting."
      commentary: |
          Goenka's characteristically direct instruction captures the essence
          of vipassana — awareness plus equanimity. The transformation happens
          not through effort but through sustained, non-reactive observation.
