id: gate-gate
title: Gate Gate Paragate Mantra
sanskrit: 'Gate Gate Paragate Parasamgate Bodhi Svaha'
pali: null
tradition: Mahayana
description: >-
    The concluding mantra of the Heart Sutra (Prajnaparamita Hridaya), widely
    regarded as the essence of the Perfection of Wisdom teachings. This mantra
    encapsulates the entire journey from suffering to awakening in a single
    breath. It is the heart of the heart — the distillation of the Buddha's
    most profound teaching on emptiness into six words of transformative power.
phonetic: 'GAH-tay GAH-tay pah-rah-GAH-tay pah-rah-sahm-GAH-tay BOH-dee SVAH-hah'
syllables:
    - text: Gate
      phonetic: 'GAH-tay'
      literal: 'gone'
      meaning: >-
          "Gone" — the first step beyond the shore of suffering. It marks the
          initial turning of the mind from samsaric confusion toward the path
          of liberation, the courageous decision to seek awakening.
    - text: Gate
      phonetic: 'GAH-tay'
      literal: 'gone'
      meaning: >-
          "Gone" repeated — gone further, gone deeper. Having set out on the
          path, the practitioner deepens their commitment and understanding,
          progressing through the stages of insight and relinquishing
          increasingly subtle attachments.
    - text: Paragate
      phonetic: 'pah-rah-GAH-tay'
      literal: 'gone beyond'
      meaning: >-
          "Gone beyond" — crossed to the other shore. This marks the
          transcendence of the ordinary, conditioned mind. The practitioner
          has gone beyond conventional understanding into direct insight
          into the nature of emptiness.
    - text: Parasamgate
      phonetic: 'pah-rah-sahm-GAH-tay'
      literal: 'gone completely beyond'
      meaning: >-
          "Gone completely beyond" — utterly and thoroughly transcended. Not
          merely arrived at the other shore but dissolved even the notion of
          two shores. This is the full realisation of emptiness where even
          the concept of "beyond" is released.
    - text: Bodhi
      phonetic: 'BOH-dee'
      literal: 'awakening; enlightenment'
      meaning: >-
          "Awakening" — the fruit of the journey. Bodhi is not a place
          arrived at but the natural state revealed when all obscurations
          have been removed. It is the luminous, empty awareness that was
          always already present.
    - text: Svaha
      phonetic: 'SVAH-hah'
      literal: 'so be it; hail'
      meaning: >-
          "So be it" or "hail" — the joyful seal of the mantra. It is both a
          celebration and a letting go, releasing even the mantra itself into
          the vastness of prajna. The journey is complete; there is nothing
          more to grasp.
meaning: >-
    The Heart Sutra describes this mantra as "the great mantra, the mantra of
    great knowledge, the unsurpassed mantra, the mantra equal to the unequalled,
    which allays all suffering." Read progressively, it maps the entire path:
    Gate (setting out), Gate (deepening), Paragate (transcending), Parasamgate
    (completely transcending even transcendence), Bodhi (awakening). It is
    spoken by the bodhisattva Avalokiteshvara from the depths of prajna-
    paramita, and it carries the power of the entire Perfection of Wisdom
    literature in a single line. To recite it is to enact the journey itself.
usage: >-
    Recite silently or aloud during seated meditation, often as a complement to
    studying or chanting the Heart Sutra. The traditional count is 108
    repetitions per session using a mala. This mantra is especially powerful
    when combined with contemplation on emptiness — allow each repetition to
    dissolve fixed ideas about self, other, and the path itself. It may also be
    recited as a standalone practice during walking meditation or in moments of
    transition and uncertainty, as a reminder that the deepest wisdom lies in
    letting go.
defaultRepetitions: 108
relatedConcepts:
    - sunyata
    - prajna
    - heart-sutra
    - bodhisattva
