id: green-tara
title: Green Tara Mantra
sanskrit: 'Om Tare Tuttare Ture Soha'
pali: null
tradition: Vajrayana
description: >-
    The mantra of Green Tara, the female bodhisattva of swift compassionate
    action. Tara is revered throughout Tibetan and East Asian Buddhism as the
    mother of liberation who rescues beings from the eight great fears. Her
    mantra is recited to invoke protection, remove obstacles, and cultivate
    fearless compassion in daily life.
phonetic: 'OHM tah-RAY toot-tah-RAY too-RAY so-HAH'
syllables:
    - text: Om
      phonetic: 'OHM'
      literal: 'sacred universal syllable'
      meaning: >-
          The universal sacred syllable, representing the body, speech, and mind
          of all buddhas. It opens the mantra by invoking the totality of
          enlightened awareness.
    - text: Tare
      phonetic: 'tah-RAY'
      literal: 'she who liberates'
      meaning: >-
          "She who liberates" — Tara saves beings from the suffering of samsara,
          the cycle of conditioned existence. This syllable calls upon her power
          to free us from worldly dangers and the root suffering of self-grasping.
    - text: Tuttare
      phonetic: 'toot-tah-RAY'
      literal: 'she who removes all fears'
      meaning: >-
          "She who removes all fears" — Tara protects from the eight great fears:
          lions (pride), elephants (delusion), fire (anger), snakes (jealousy),
          thieves (wrong views), chains (attachment), floods (desire), and demons
          (doubt). She liberates from inner afflictions as well as outer dangers.
    - text: Ture
      phonetic: 'too-RAY'
      literal: 'she who grants all success'
      meaning: >-
          "She who grants all success" — Tara removes the subtle obscurations of
          ignorance and bestows genuine spiritual accomplishment. This syllable
          invokes her power to eliminate illness, negative karma, and obstacles on
          the path to awakening.
    - text: Soha
      phonetic: 'so-HAH'
      literal: 'so be it; may it take root'
      meaning: >-
          "So be it" or "may the meaning of this mantra take root in my mind."
          This sealing syllable establishes the blessings of the mantra and
          dedicates the merit to all sentient beings.
meaning: >-
    The mantra can be understood as a threefold invocation: Tare liberates from
    the suffering of samsara, Tuttare liberates from the eight fears and inner
    afflictions, and Ture liberates from ignorance and grants spiritual
    attainment. Together the three syllables represent Tara's complete activity
    of protection, purification, and awakening. Reciting the mantra is said to
    swiftly invoke Tara's compassionate presence, clearing obstacles and
    instilling courage and confidence on the path.
usage: >-
    Recite silently or aloud during seated meditation, walking practice, or
    whenever you feel fear, anxiety, or a need for protection. The traditional
    count is 108 repetitions per session using a mala. Shorter rounds of 21 or
    27 repetitions are common for daily practice. You may visualise Green Tara
    seated on a lotus, radiating emerald-green light that dissolves obstacles
    and fills your body with healing energy. Coordinate with the breath if
    helpful: inhale on "Om Tare," exhale on "Tuttare Ture Soha." Let the
    recitation be steady and heartfelt rather than hurried.
defaultRepetitions: 108
relatedConcepts:
    - karuna
    - bodhisattva
    - sunyata
    - metta
    - samsara
