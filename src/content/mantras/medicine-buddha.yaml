id: medicine-buddha
title: Medicine Buddha Mantra
sanskrit: 'Tayata Om Bekandze Bekandze Maha Bekandze Radza Samudgate Soha'
pali: null
tradition: Mahayana
description: >-
    The mantra of Bhaisajyaguru, the Medicine Buddha, who embodies the healing
    power of all buddhas. Recited to promote physical and mental healing, purify
    negative karma that causes illness, and cultivate the aspiration to relieve
    the suffering of all sentient beings.
phonetic: 'tah-YAH-tah OHM beh-KAHN-dzay beh-KAHN-dzay mah-HAH beh-KAHN-dzay RAHD-zah sah-mood-GAH-tay SO-hah'
syllables:
    - text: Tayata
      phonetic: 'tah-YAH-tah'
      literal: 'thus; it is like this'
      meaning: >-
          "Thus" or "it is like this" — an opening declaration that establishes
          the ground of the mantra, invoking the truth of the Buddha's healing
          vow.
    - text: Om
      phonetic: 'OHM'
      literal: 'sacred universal syllable'
      meaning: >-
          The universal sacred syllable representing the body, speech, and mind
          of all buddhas. It opens the heart of the mantra to the totality of
          enlightened healing energy.
    - text: Bekandze
      phonetic: 'beh-KAHN-dzay'
      literal: 'eliminating pain'
      meaning: >-
          "Eliminating pain" — the first repetition removes the suffering of
          illness rooted in the gross afflictions of desire, anger, and
          ignorance.
    - text: Bekandze
      phonetic: 'beh-KAHN-dzay'
      literal: 'eliminating pain'
      meaning: >-
          The second repetition removes the subtle inner causes of sickness —
          the karmic imprints and mental afflictions that give rise to disease
          in the first place.
    - text: Maha Bekandze
      phonetic: 'mah-HAH beh-KAHN-dzay'
      literal: 'great eliminating of pain'
      meaning: >-
          "Great eliminating of pain" — removes even the most deeply embedded
          karmic obscurations and ignorance, the ultimate root of all suffering
          and illness. This is the definitive healing of full awakening.
    - text: Radza Samudgate
      phonetic: 'RAHD-zah sah-mood-GAH-tay'
      literal: 'king who has fully arisen'
      meaning: >-
          "Supreme king who has fully arisen" — an invocation of the Medicine
          Buddha as the sovereign healer, whose awakened power arises
          completely to benefit all beings.
    - text: Soha
      phonetic: 'SO-hah'
      literal: 'so be it; may it take root'
      meaning: >-
          "So be it" or "may the meaning of this mantra take root in my mind."
          This sealing syllable establishes the blessings of healing and
          dedicates the merit.
meaning: >-
    The mantra progressively addresses three levels of suffering: gross physical
    and mental afflictions (first Bekandze), subtle karmic causes of illness
    (second Bekandze), and the fundamental ignorance underlying all suffering
    (Maha Bekandze). By invoking the Medicine Buddha — the king (Radza) who has
    fully arisen (Samudgate) into perfect healing wisdom — the practitioner
    opens to the possibility of healing on every level: body, mind, and spirit.
usage: >-
    Recite silently or aloud during seated meditation, especially when ill or
    when dedicating practice to someone who is suffering. The traditional count
    is 108 repetitions per session using a mala. You may visualise the Medicine
    Buddha in his lapis-lazuli blue form, radiating deep blue healing light that
    dissolves illness and purifies negative karma. Coordinate with the breath
    naturally: let the recitation be calm and heartfelt, trusting in the
    healing intention rather than rushing through repetitions.
defaultRepetitions: 108
relatedConcepts:
    - karuna
    - bodhicitta
    - karma
