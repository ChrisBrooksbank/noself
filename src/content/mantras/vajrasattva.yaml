id: vajrasattva
title: Vajrasattva Hundred-Syllable Mantra
sanskrit: >-
    Om Vajrasattva Samayam Anupalaya Vajrasattva Tvenopatishtha Dridho Me
    Bhava Sutoshyo Me Bhava Suposhyo Me Bhava Anurakto Me Bhava Sarva
    Siddhim Me Prayaccha Sarva Karma Su Cha Me Chittam Shriyam Kuru Hum
    Ha Ha Ha Ha Hoh Bhagavan Sarva Tathagata Vajra Ma Me Muncha Vajri
    Bhava Maha Samaya Sattva Ah Hum Phat
pali: null
tradition: Vajrayana
description: >-
    The hundred-syllable purification mantra of Vajrasattva, the primordial
    buddha of purification. This is the most powerful purification practice in
    Vajrayana Buddhism, used in the preliminary practices (ngondro) to purify
    negative karma, broken samaya vows, and obscurations accumulated over
    countless lifetimes. Vajrasattva embodies the purity of all buddha families.
phonetic: >-
    OHM VAH-jrah-SAHT-tvah sah-MAH-yahm ah-noo-PAH-lah-yah VAH-jrah-SAHT-tvah
    tvay-noh-pah-TISHT-hah DREE-doh may BHAH-vah soo-TOSH-yoh may BHAH-vah
    soo-POSH-yoh may BHAH-vah ah-noo-RAHK-toh may BHAH-vah SAHR-vah SIHD-dheem
    may PRAH-yahch-chah SAHR-vah KAHR-mah soo chah may CHIHT-tahm SHREE-yahm
    KOO-roo HOOM HAH HAH HAH HAH HOH BHAH-gah-vahn SAHR-vah tah-TAH-gah-tah
    VAH-jrah mah may MOON-chah VAH-jree BHAH-vah mah-HAH sah-MAH-yah SAHT-tvah
    AH HOOM PHAHT
syllables:
    - text: Om Vajrasattva Samayam Anupalaya
      phonetic: 'OHM VAH-jrah-SAHT-tvah sah-MAH-yahm ah-noo-PAH-lah-yah'
      literal: 'Om Vajrasattva, guard the samaya'
      meaning: >-
          "O Vajrasattva, protect the sacred bond (samaya)." The mantra opens
          by invoking Vajrasattva and requesting that the sacred commitment
          between guru and disciple be maintained and restored.
    - text: Vajrasattva Tvenopatishtha
      phonetic: 'VAH-jrah-SAHT-tvah tvay-noh-pah-TISHT-hah'
      literal: 'Vajrasattva, be present for me'
      meaning: >-
          "Vajrasattva, stand firmly before me." A direct plea for
          Vajrasattva's presence and blessing, asking that his purifying power
          remain close and accessible.
    - text: Dridho Me Bhava
      phonetic: 'DREE-doh may BHAH-vah'
      literal: 'be firm for me'
      meaning: >-
          "Be firm for me" — requesting that Vajrasattva's commitment to the
          practitioner be unwavering and stable, establishing a ground of
          trust and devotion.
    - text: Sutoshyo Me Bhava Suposhyo Me Bhava Anurakto Me Bhava
      phonetic: 'soo-TOSH-yoh may BHAH-vah soo-POSH-yoh may BHAH-vah ah-noo-RAHK-toh may BHAH-vah'
      literal: 'be pleased with me; be nourishing; be loving'
      meaning: >-
          Three requests: be well-pleased with me (sutoshyo), nourish and
          sustain me (suposhyo), and be loving and compassionate toward me
          (anurakto). These lines express the disciple's heartfelt devotion
          and openness to receive blessings.
    - text: Sarva Siddhim Me Prayaccha
      phonetic: 'SAHR-vah SIHD-dheem may PRAH-yahch-chah'
      literal: 'grant me all accomplishments'
      meaning: >-
          "Grant me all spiritual accomplishments (siddhis)." A request for
          both common and supreme attainments — the powers that arise through
          purification and the ultimate attainment of awakening.
    - text: Sarva Karma Su Cha Me Chittam Shriyam Kuru
      phonetic: 'SAHR-vah KAHR-mah soo chah may CHIHT-tahm SHREE-yahm KOO-roo'
      literal: 'make my mind virtuous in all actions'
      meaning: >-
          "In all actions, make my mind glorious and virtuous." A request that
          all karmic activity — of body, speech, and mind — be transformed
          into a source of merit and wisdom.
    - text: Hum Ha Ha Ha Ha Hoh
      phonetic: 'HOOM HAH HAH HAH HAH HOH'
      literal: 'seed syllables of the five wisdoms and joy'
      meaning: >-
          The five syllables Ha represent the five buddha wisdoms and the
          spontaneous joy of awakening. Hum seeds the vajra mind and Hoh
          expresses the delight of liberation. Together they invoke the
          ecstatic energy of purification.
    - text: Bhagavan Sarva Tathagata Vajra Ma Me Muncha
      phonetic: 'BHAH-gah-vahn SAHR-vah tah-TAH-gah-tah VAH-jrah mah may MOON-chah'
      literal: 'blessed one, all tathagatas, vajra, do not abandon me'
      meaning: >-
          "O blessed one, vajra of all tathagatas, do not abandon me." A
          fervent plea that the diamond-like commitment of all the buddhas
          remain with the practitioner, never forsaking them even in the
          midst of confusion.
    - text: Vajri Bhava Maha Samaya Sattva
      phonetic: 'VAH-jree BHAH-vah mah-HAH sah-MAH-yah SAHT-tvah'
      literal: 'make me vajra-natured, great samaya being'
      meaning: >-
          "Grant me the vajra nature, O great samaya being." A request to be
          transformed into the indestructible diamond nature of awakened mind,
          united with Vajrasattva through the great sacred bond.
    - text: Ah Hum Phat
      phonetic: 'AH HOOM PHAHT'
      literal: 'the three vajras; cutting through'
      meaning: >-
          The three seed syllables of enlightened body (Ah), mind (Hum), and
          activity (Phat). Phat is a wrathful syllable that cuts through all
          remaining obscurations with decisive finality, sealing the
          purification.
meaning: >-
    The hundred-syllable mantra is a complete purification liturgy in miniature.
    It opens by invoking Vajrasattva and requesting that broken samayas be
    restored. The middle verses are a series of heartfelt pleas: be firm, be
    pleased, be loving, grant all attainments, make my mind virtuous. The
    climax invokes the five wisdoms through joyful seed syllables, then
    culminates in the ultimate plea — do not abandon me — before sealing the
    practitioner's transformation into the vajra nature itself. Recited with
    sincere regret and the four opponent powers, it purifies even the heaviest
    negative karma.
usage: >-
    Recite 21 times per session as part of daily purification practice, or 108
    times during intensive retreat. This mantra is a central element of the
    Vajrayana preliminary practices (ngondro), where 100,000 repetitions are
    traditionally accumulated. Visualise Vajrasattva above the crown of your
    head, brilliant white and translucent, holding a vajra and bell. As you
    recite, imagine purifying nectar streaming down from his heart, entering
    through the crown of your head and washing away all negativity, which exits
    as black smoke from the pores and soles of the feet. Recite slowly and
    clearly, with genuine regret for past harmful actions.
defaultRepetitions: 21
relatedConcepts:
    - karma
    - sunyata
    - bodhicitta
    - samaya
