id: metta
title: Loving-Kindness (Metta)
description: >
    Cultivate boundless goodwill toward yourself and all beings. This practice
    systematically expands the heart from self-compassion outward to include
    friends, neutral people, difficult people, and all of existence.
videos:
    - title: 10-Minute Guided Loving-Kindness Meditation
      teacher: Sharon Salzberg
      videoUrl: https://www.youtube.com/watch?v=FyKKvCO_vSA
      duration: '10m'
      type: guided
    - title: 'Guided Meditation: The Practice of RAIN'
      teacher: Tara Brach
      videoUrl: https://www.youtube.com/watch?v=W8e_tAEM80k
      duration: '20m'
      type: guided
durations:
    - 10
    - 15
    - 20
steps:
    10:
        - instruction: >
              Find a comfortable, upright posture. Gently close your eyes and
              take a moment to arrive here.
          durationSeconds: 30
        - instruction: >
              Take three slow, deep breaths. With each exhale, let any tension
              release from your body.
          durationSeconds: 40
        - instruction: >
              Bring your attention to the center of your chest. Silently repeat
              these phrases for yourself: "May I be happy. May I be at peace.
              May I be free from suffering." Let the words land in the heart.
          durationSeconds: 90
        - instruction: >
              Now bring to mind someone you care for deeply — a friend, a loved
              one. Hold their image gently. Offer them the same phrases: "May
              you be happy. May you be at peace. May you be free from suffering."
          durationSeconds: 90
        - instruction: >
              Extend these wishes to someone you don't know well — a neighbor,
              a stranger you've seen. "May you be happy. May you be at peace.
              May you be free from suffering."
          durationSeconds: 90
        - instruction: >
              Call to mind someone with whom you have difficulty. Offer them the
              same words, even if it feels unfamiliar: "May you be happy. May
              you be at peace." You don't need to feel it fully — just the
              intention is enough.
          durationSeconds: 80
        - instruction: >
              Now expand the circle outward to all beings — near and far, seen
              and unseen, humans and animals: "May all beings be happy. May all
              beings be at peace. May all beings be free."
          durationSeconds: 90
        - instruction: >
              Rest in this openness for a moment. Take one final, slow breath.
              When you are ready, gently open your eyes.
          durationSeconds: 90
    15:
        - instruction: >
              Settle into a comfortable, upright posture. Gently close your
              eyes. Take a moment to feel your body here, in this seat.
          durationSeconds: 30
        - instruction: >
              Take three slow breaths. With each exhale, let the body soften.
              Allow yourself to simply be here.
          durationSeconds: 40
        - instruction: >
              Bring attention to the area of the chest — the heart center. Begin
              with yourself. Silently offer these phrases: "May I be happy. May
              I be healthy. May I be at peace. May I be free from suffering."
              Repeat them gently, letting each phrase settle.
          durationSeconds: 120
        - instruction: >
              Now bring to mind someone you love — perhaps a dear friend, a
              family member, or a beloved teacher. Hold their face or presence
              in mind and offer: "May you be happy. May you be healthy. May you
              be at peace. May you be free from suffering."
          durationSeconds: 120
        - instruction: >
              Call to mind a neutral person — someone you see regularly but have
              no strong feelings toward. Extend the same warm wishes to them.
              "May you be happy. May you be at peace."
          durationSeconds: 100
        - instruction: >
              Bring to mind a difficult person — someone who challenges you.
              Rest in your intention to offer goodwill: "May you be happy. May
              you be free from suffering." You do not need to feel warmth yet —
              the intention itself is the practice.
          durationSeconds: 100
        - instruction: >
              Expand the circle outward — your neighborhood, your city, all
              the people going about their lives. "May you all be happy. May
              you all be free from suffering."
          durationSeconds: 120
        - instruction: >
              Let the field of loving-kindness expand to all beings everywhere.
              No boundary, no limit: "May all beings be happy. May all beings
              be at peace. May all beings be free."
          durationSeconds: 120
        - instruction: >
              Rest here in openness. No phrases now — just the quality of
              goodwill itself, radiating outward like warmth. When you are
              ready, gently return your awareness to the room and open your eyes.
          durationSeconds: 150
    20:
        - instruction: >
              Find a comfortable, upright posture. Settle your hands in your
              lap. Gently close your eyes and let your body be still.
          durationSeconds: 30
        - instruction: >
              Take three slow, deliberate breaths. Let each exhale carry away
              any hurry or effort. You are not going anywhere — simply here.
          durationSeconds: 40
        - instruction: >
              Bring awareness to the heart center. Begin with yourself — not as
              you want to be, but as you are right now. Silently offer these
              phrases, one at a time: "May I be happy. May I be healthy. May I
              be safe. May I live with ease." Allow each phrase to land in the
              body before moving to the next.
          durationSeconds: 150
        - instruction: >
              Now bring to mind someone you love unconditionally. See their face,
              feel their presence. Extend the same phrases: "May you be happy.
              May you be healthy. May you be safe. May you live with ease."
              Let the feeling expand naturally.
          durationSeconds: 150
        - instruction: >
              Bring to mind a good friend or someone you care for. Offer them
              loving-kindness with the same phrases. "May you be happy. May you
              be at peace. May you live with ease."
          durationSeconds: 150
        - instruction: >
              Call to mind a neutral person — someone you encounter regularly
              without strong feeling. Recognize that they too wish to be happy
              and free from suffering. Extend: "May you be happy. May you be
              at peace."
          durationSeconds: 150
        - instruction: >
              Now bring to mind someone difficult — someone who provokes
              frustration or tension. This is the edges of the practice. Offer
              the phrases even imperfectly: "May you be happy. May you be free
              from suffering." Notice what arises without forcing it.
          durationSeconds: 150
        - instruction: >
              Expand outward — to all people in your community, your city, your
              country: "May you all be happy. May you all live with ease."
          durationSeconds: 180
        - instruction: >
              Let the circle expand without limit — all beings on this planet,
              all creatures, all sentient life: "May all beings be happy. May
              all beings be free from suffering. May all beings be at peace."
          durationSeconds: 150
        - instruction: >
              Rest in boundlessness. No phrases now — just the open quality of
              goodwill itself. Gently deepen your breath. When you are ready,
              open your eyes.
          durationSeconds: 50
