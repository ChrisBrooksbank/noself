id: open-awareness
title: Open Awareness
level: 2
description: >
    Rest in the vast, unbound quality of awareness itself — receiving all
    experiences without grasping or rejecting any of them. This practice
    cultivates the sky-like nature of mind that remains undisturbed as
    phenomena arise and pass like clouds.
videos:
    - title: "Awakening: Three Practices for Navigating Life's Challenges"
      teacher: Yongey Mingyur Rinpoche
      videoUrl: https://www.youtube.com/watch?v=6RbPTDGJIF8
      duration: '20m'
      type: teaching
    - title: Buddhism and Non-Self
      teacher: Joseph Goldstein
      videoUrl: https://www.youtube.com/watch?v=IJDSQm0xb0c
      duration: '45m'
      type: teaching
durations:
    - 10
    - 20
steps:
    10:
        - instruction: >
              Find a comfortable, upright posture. Gently close your eyes.
              Take a moment to feel the body settled and still.
          durationSeconds: 30
        - instruction: >
              Take three slow breaths to settle the mind. With the final exhale,
              release any agenda for this session. You have nowhere to go and
              nothing to fix.
          durationSeconds: 40
        - instruction: >
              Allow awareness to open to sounds — both near and distant. Don't
              seek any particular sound; simply receive whatever arises. Let
              sounds come and go without holding any of them.
          durationSeconds: 90
        - instruction: >
              Now open to sensations in the body. Without directing attention
              to any particular area, simply receive whatever physical experience
              is present. Let sensations arise and dissolve in awareness.
          durationSeconds: 90
        - instruction: >
              Notice thoughts as they arise — not by following their content,
              but by recognizing them as objects in awareness. They arise, they
              pass. They are like sounds in the mind — not you, but simply
              events that occur.
          durationSeconds: 90
        - instruction: >
              Open to everything at once — sounds, sensations, thoughts, the
              rhythm of the breath. Let awareness be a wide, still space in
              which all of these arise and pass. You are the space, not the
              contents.
          durationSeconds: 80
        - instruction: >
              Rest in this openness. No grasping, no pushing away. Simply
              awareness — present, clear, and unperturbed.
          durationSeconds: 90
        - instruction: >
              Take one slow breath. Let awareness come back gently to the body.
              When you are ready, open your eyes.
          durationSeconds: 90
    20:
        - instruction: >
              Find a comfortable, upright posture. Let the hands rest in the
              lap. Gently close your eyes and allow the body to be completely
              still.
          durationSeconds: 30
        - instruction: >
              Take three slow, deep breaths. With each exhale, release any
              effort. Allow the breath to return to its natural pace. There
              is nothing to achieve here — just resting in what is.
          durationSeconds: 50
        - instruction: >
              Open awareness to sounds. Receive them without searching. Near
              sounds, distant sounds, the space between sounds. You do not need
              to name or analyze — simply hear. Let sounds arise and dissolve
              like ripples on the surface of still water.
          durationSeconds: 120
        - instruction: >
              Now open to physical sensations throughout the body. Rather than
              directing attention to a particular location, let whatever sensation
              is prominent simply be present. Warmth, pressure, the weight of
              the body. Receive it all without preference.
          durationSeconds: 120
        - instruction: >
              Allow thoughts to arise without following them. When a thought
              appears, notice it — perhaps note silently "thinking" — and let
              it pass without taking hold of its content. Thoughts are objects
              in awareness, not the aware itself.
          durationSeconds: 120
        - instruction: >
              Now ask: what is aware? Not as a philosophical question, but as
              direct investigation. Is awareness itself a sensation? Does it
              have a location? Rest with this inquiry — not to answer it, but
              to see directly.
          durationSeconds: 120
        - instruction: >
              Let go of any method or technique. Simply rest as open awareness —
              receiving everything that arises without grasping or rejecting any
              of it. Like the sky, which holds every weather but is touched
              by none.
          durationSeconds: 120
        - instruction: >
              Rest in this sky-like quality. Thoughts, sensations, sounds arise
              and pass like clouds. You are not the clouds. You are the sky —
              boundless, clear, and undisturbed.
          durationSeconds: 150
        - instruction: >
              Hold nothing. Release nothing. Simply be the aware presence in
              which all experience arises and dissolves. This is open awareness —
              the natural resting place of the mind.
          durationSeconds: 150
        - instruction: >
              Gently deepen your breathing. Become aware of the room around you.
              As you open your eyes, see if the quality of open, spacious
              awareness can remain — not only here on the cushion, but
              throughout the day.
          durationSeconds: 220
