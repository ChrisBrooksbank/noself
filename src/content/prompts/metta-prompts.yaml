id: metta-prompts
conceptId: metta
prompts:
    - id: metta-1
      conceptId: metta
      depth: beginner
      question: Think of someone you care about easily and naturally. What does genuine goodwill feel like in the body and heart? Can you rest in that feeling for a moment?
      guidance: >
          Bring to mind a person — or an animal — for whom you feel uncomplicated warmth. A close friend, a child, a beloved pet. Let the feeling of warmth or care arise naturally without forcing it. Notice where you feel it in the body: the chest, the softening of the face, a gentle opening. This is the seed of metta. You are not manufacturing a feeling — you are recognizing one that is already present. Rest here as long as it feels genuine.

    - id: metta-2
      conceptId: metta
      depth: intermediate
      question: Can you extend the same quality of goodwill you feel toward a loved one to a neutral person — someone you neither like nor dislike? What happens when you try?
      guidance: >
          Begin with the warm feeling of goodwill cultivated toward someone easy. Hold it steady. Now gently bring to mind a neutral person — a cashier, a neighbor you rarely speak to, someone you passed on the street. Offer the same quality of goodwill: "May you be well. May you be happy. May you be free from suffering." Notice any resistance, indifference, or flatness. This is not failure — it is the frontier of practice. Metta toward neutral beings is where the heart learns to expand beyond preference.

    - id: metta-3
      conceptId: metta
      depth: advanced
      question: What would it mean to hold a difficult person — someone who has caused you harm — within the field of metta? What arises when you try, and what does that reveal?
      guidance: >
          This is one of the most challenging and revealing practices. Begin with yourself, then a loved one, until you have some warmth established. Then gently — without forcing — bring to mind someone difficult. Offer the phrases: "May you be well. May you be free from suffering." Notice what arises: resistance, anger, grief, reluctance. Do not suppress these — observe them with curiosity. The practice is not about approving of harmful actions, but about recognizing that even those who cause harm are themselves suffering, driven by causes and conditions. What does this recognition open in you?
